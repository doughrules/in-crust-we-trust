function calcOverall(cats) {
  const parsed = typeof cats === "string" ? JSON.parse(cats) : (cats||{});
  const vals = Object.values(parsed).filter(v=>typeof v === "number" && v > 0);
  if (!vals.length) return 0;
  return Math.round(vals.reduce((a,b)=>a+b,0) / 30 * 100);
}


// ── Value Score: pure ratio score/price (currency-agnostic for sorting)
// Normalise to USD-equivalent for rough comparison
const CURRENCY_TO_USD = { PHP:0.017, USD:1, JPY:0.0067, SGD:0.74, THB:0.028, HKD:0.13, EUR:1.08, GBP:1.27, AUD:0.64 };
// Worth It thresholds by price in USD:
// ≤$10→70, ≤$25→75, ≤$30→85, ≤$40→90, ≤$60→95, $61+→never worth it
function worthItThreshold(usd) {
  if (usd >= 61) return Infinity; // never worth it
  if (usd >= 50) return 95;
  if (usd >= 40) return 90;
  if (usd >= 30) return 85;
  if (usd >= 20) return 75;
  if (usd >= 10) return 70;
  return 60;
}
function isWorthIt(score, price, currency) {
  const p = parseFloat(price);
  if (!p || p <= 0) return null;
  const usd = p * (CURRENCY_TO_USD[currency] || 1);
  return score >= worthItThreshold(usd);
}
function valueLabel(score, price, currency) {
  const w = isWorthIt(score, price, currency);
  if (w === null) return null;
  return w
    ? { text:"✅ Worth It",     color:"#2d8a4e" }
    : { text:"❌ Not Worth It", color:"#c93b0a" };
}
// Keep a ratio for sort purposes only
function valueRatio(score, price, currency) {
  const p = parseFloat(price);
  if (!p || p <= 0) return null;
  const usd = p * (CURRENCY_TO_USD[currency] || 1);
  return score / usd;
}

function getLevel(count) {
  return LEVEL_THRESHOLDS.find(l=>count>=l.min) || LEVEL_THRESHOLDS[2];
}

function scoreToPercent(score) { return score; } // 0-100 pass-through

// Pizza graphic behind score: emoji pizza as background, bold number on top
function PizzaFill({ score, size=48 }) {
  const pct = scoreToPercent(score);
  const color = pct>=80?"#c93b0a" : pct>=60?"#c17b3a" : pct>=40?"#9a5c1a" : "#b08050";
  const fontSize = size >= 70 ? size*0.26 : size >= 40 ? size*0.28 : size*0.32;
  return (
    <div style={{ position:"relative", width:size, height:size, display:"inline-flex",
      alignItems:"center", justifyContent:"center" }}>
      {/* Pizza emoji as the graphic background */}
      <span style={{ position:"absolute", fontSize:size*0.92, lineHeight:1,
        userSelect:"none", filter:"saturate(1.1)" }}>🍕</span>
      {/* Score number on top */}
      <span style={{ position:"relative", zIndex:1, fontSize, fontWeight:900,
        color:"white", lineHeight:1, fontFamily:"Georgia,serif",
        letterSpacing:"-0.02em",
        textShadow:`0 1px 4px rgba(0,0,0,0.55), 0 0 12px rgba(0,0,0,0.3)` }}>
        {score}
      </span>
    </div>
  );
}

// Card badge: bold number + small 🍕 to the right (Infatuation style)
function ScoreBadge({ score, large=false }) {
  const num   = score;
  const pct   = score;
  const color = pct>=80?"#c93b0a" : pct>=60?"#c17b3a" : "#9a5c1a";
  const fs    = large ? 28 : 20;
  const efs   = large ? 14 : 11;
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:3 }}>
      <span style={{ fontSize:fs, fontWeight:900, color, fontFamily:"Georgia,serif",
        letterSpacing:"-0.03em", lineHeight:1 }}>{num}</span>
      <span style={{ fontSize:efs, lineHeight:1 }}>🍕</span>
    </span>
  );
}

// Horizontal progress bar for category breakdown (score is 0-5 per category)
function PizzaMeter({ score, label, showLabel=true }) {
  const pct = Math.round((score||0) / 5 * 100);
  const bg = pct>=80?"linear-gradient(90deg,#c93b0a,#e8600a)"
           : pct>=60?"linear-gradient(90deg,#9a5c1a,#c17b3a)"
           :          "linear-gradient(90deg,#b08050,#c8a070)";
  return (
    <div style={{ width:"100%" }}>
      {showLabel && (
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
          <span style={{ fontSize:11, fontWeight:800, color:T.textMid }}>{label}</span>
          <span style={{ fontSize:11, fontWeight:900, color:T.red }}>{pct}%</span>
        </div>
      )}
      <div style={{ height:7, borderRadius:99, background:T.bgDeep, overflow:"hidden" }}>
        <div style={{ height:"100%", borderRadius:99, width:`${pct}%`, background:bg,
          transition:"width 0.5s cubic-bezier(.4,0,.2,1)" }}/>
      </div>
    </div>
  );
}

// Per-criterion interactive slice picker
function CategoryRater({ cat, value, onChange }) {
  const [hover, setHover] = useState(null);
  const display = hover ?? value;
  function resolve(e,i) {
    const rect = e.currentTarget.getBoundingClientRect();
    return e.clientX < rect.left+rect.width/2 ? i-0.5 : i;
  }
  return (

        {[1,2,3,4,5].map(i=>(
          <span key={i}
            style={{ fontSize:"1.3rem", userSelect:"none", lineHeight:1,
              transition:"transform 0.07s",
              transform:display>=i-0.4?"scale(1.2)":"scale(1)",
              opacity:display>=i?1:display>=i-0.5?0.5:0.18 }}
            onMouseMove={e=>setHover(resolve(e,i))}
            onClick={e=>onChange(resolve(e,i))}
            onTouchEnd={e=>{ e.preventDefault(); const t=e.changedTouches[0];
              const rect=e.currentTarget.getBoundingClientRect();
              onChange(t.clientX<rect.left+rect.width/2?i-0.5:i); setHover(null); }}
          >🍕</span>
        ))}
      </div>
      <div style={{ width:28, textAlign:"right", fontSize:13, fontWeight:900,
        color:display?T.red:T.textLight }}>
        {display||"—"}
      </div>
    </div>
  );
}

function Tag({ label, icon, selected, onClick, negative }) {
  const ac  = negative ? T.red : T.green;
  const abg = negative ? T.deleteBg : T.greenBg;
  const border = selected
    ? `2px solid ${ac}`
    : negative ? "2px solid rgba(201,59,10,0.25)" : "2px solid rgba(45,138,78,0.25)";
  const bg = selected ? abg : negative ? "rgba(201,59,10,0.04)" : "rgba(45,138,78,0.04)";
  return (
    <button onClick={onClick} style={{ padding:"5px 11px", borderRadius:99, fontSize:12,
      fontWeight:800, border, background:bg, color:ac,
      display:"flex", alignItems:"center", gap:4, cursor:"pointer",
      opacity: selected ? 1 : 0.6,
      transition:"all 0.12s" }}>
      {icon} {label}

  );

function AutocompleteInput({ value, onChange, suggestions, placeholder, style: extraStyle }) {
  const [open, setOpen] = useState(false);
  const filtered = value.length > 0
    ? [...new Set(suggestions)].filter(s => s.toLowerCase().includes(value.toLowerCase()) && s.toLowerCase() !== value.toLowerCase()).slice(0, 6)
    : [];

  return (
    <div style={{ position:"relative" }}>
      <input
        value={value}
        onChange={e => { onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 150)}
        placeholder={placeholder}
        style={extraStyle}
        autoComplete="off"
      />
      {open && filtered.length > 0 && (
        <div style={{ position:"absolute", top:"calc(100% + 4px)", left:0, right:0, zIndex:100,
          background:"white", border:`1.5px solid ${T.borderMed}`, borderRadius:12,
          boxShadow:"0 6px 24px rgba(180,100,30,0.14)", overflow:"hidden" }}>
          {filtered.map(s => (
            <div key={s}
              onMouseDown={() => { onChange(s); setOpen(false); }}
              style={{ padding:"10px 14px", cursor:"pointer", fontSize:14,
                color:T.textDark, fontFamily:"Georgia,serif",
                borderBottom:`1px solid ${T.border}`,
                transition:"background 0.1s" }}
              onMouseEnter={e => e.currentTarget.style.background = T.bgDeep}
              onMouseLeave={e => e.currentTarget.style.background = "white"}>
              {s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function RatePage({ setPage, addRating, editRating, editingRating, setEditingRating, allRatings }) {
  const isEdit = !!editingRating;

  // ── Session-level state (shared across all pizzas in one visit) ──
  const [restaurant, setRestaurant] = useState(isEdit ? editingRating.restaurant : "");
  const [city, setCity]             = useState(isEdit ? editingRating.city||""   : "");
  const [country, setCountry]       = useState(isEdit ? editingRating.country||"": "");
  // Session-level vibes (rated once per place)
  const _editCats = isEdit ? (typeof editingRating.cats === "string" ? JSON.parse(editingRating.cats) : editingRating.cats) : null;
  const [sessionVibes, setSessionVibes] = useState(isEdit && _editCats ? _editCats.vibes || 0 : 0);

  // ── Current pizza being rated ──
  const [pizzaName, setPizzaName]   = useState(isEdit ? editingRating.pizzaName  : "");
  const [style, setStyle]           = useState(isEdit ? editingRating.style      : "");
  const _ec = isEdit ? (typeof editingRating.cats==="string" ? JSON.parse(editingRating.cats) : editingRating.cats||{}) : {};
  const [cats, setCats]             = useState(isEdit ? {crust:_ec.crust||0,cheese:_ec.cheese||0,bake:_ec.bake||0,toppings:_ec.toppings||0,pizzaz:_ec.pizzaz||0} : {crust:0,cheese:0,bake:0,toppings:0,pizzaz:0});
  const [review, setReview]         = useState(isEdit ? editingRating.review||"" : "");
  const [selectedTags, setSelectedTags] = useState(isEdit ? [...(editingRating.tags||[])] : []);
  const [price, setPrice]           = useState(isEdit ? (editingRating.price||'') : '');
  const [currency, setCurrency]     = useState(isEdit ? (editingRating.currency||'PHP') : 'PHP');
  // ── Multi-pizza queue (only used when not editing) ──
  const [queue, setQueue]   = useState([]); // [{pizzaName,style,cats,review,tags,score}]
  const [step, setStep]     = useState(1);  // 1=spot info, 2=score, 3=notes, 4=review queue
  const [submitted, setSubmitted] = useState(false);

  // Build suggestion lists from past ratings
  const pastRestaurants = [...new Set(allRatings.map(r => r.restaurant).filter(Boolean))];
  const pastPizzaNames  = [...new Set(allRatings.filter(r => !restaurant || r.restaurant === restaurant).map(r => r.pizzaName).filter(Boolean))];
  const pastCities      = [...new Set(allRatings.map(r => r.city).filter(Boolean))];
  const pastCountries   = [...new Set(allRatings.map(r => r.country).filter(Boolean))];

  const mergedCats = {...cats, vibes: sessionVibes};
  const overall = calcOverall(mergedCats);
  const allCatsRated = Object.values(cats).every(v=>v>0) && sessionVibes > 0;

  function toggleTag(tag) {
    setSelectedTags(p=>p.includes(tag)?p.filter(t=>t!==tag):[...p,tag]);
  }

  // Clear only the current-pizza fields, keep session fields + currency as default
  function clearPizza() {
    setPizzaName(""); setStyle("");
    setCats({crust:0,cheese:0,bake:0,toppings:0,pizzaz:0});
    setReview(""); setSelectedTags([]); setPrice('');
  }

  // Add current pizza to queue and go back to step 2 for the next one
  function addToQueue() {
    const entry = { pizzaName, style, score:overall, cats:{...mergedCats}, review, tags:[...selectedTags], price, currency };
    setQueue(q=>[...q, entry]);
    clearPizza();
    setStep(2);
  }

  // Remove a pizza from the queue
  function removeFromQueue(i) {
    setQueue(q=>q.filter((_,idx)=>idx!==i));
  }

  // Full reset
  function reset() {
    setRestaurant(""); setCity(""); setCountry(""); setPrice(''); setCurrency('PHP');
    setSessionVibes(0);
    clearPizza(); setQueue([]); setStep(1); setSubmitted(false);
    if (setEditingRating) setEditingRating(null);
  }

  // Submit the whole queue at once
  async function handleSubmitAll() {
    const date = new Date().toLocaleDateString();
    const toSave = queue.length > 0 ? queue : [{ pizzaName, style, score:overall, cats:{...mergedCats}, review, tags:[...selectedTags], price, currency }];
    for (const p of toSave) {
      await addRating({ restaurant, pizzaName:p.pizzaName, style:p.style, city, country,
        score:p.score, cats:p.cats, review:p.review, tags:p.tags,
        price:p.price, currency:p.currency, date });
    }
    setSubmitted(true);
  }

  // Edit mode: single save
  function handleEditSave() {
    const payload = { restaurant, pizzaName, style, city, country, score:overall, cats:{...mergedCats},
      review, tags:selectedTags, price, currency, date: editingRating.date };
    editRating(editingRating.id, payload);
    setSubmitted(true);
  }

  const inp = { width:"100%", borderRadius:12, padding:"11px 13px", color:T.textDark,
    outline:"none", background:"white", border:`1.5px solid ${T.borderMed}`,
    fontSize:15, boxSizing:"border-box", fontFamily:"Georgia,serif" };

  // ── SUBMITTED SCREEN ──
  if (submitted) {
    const savedList = isEdit
      ? [{ pizzaName, style, score:overall }]
      : (queue.length > 0 ? queue : [{ pizzaName, style, score:overall }]);
    return (
      <div style={{ maxWidth:420, margin:"0 auto", padding:"48px 20px 90px", textAlign:"center",
        fontFamily:"Georgia,serif" }}>
        <div style={{ fontSize:48, marginBottom:8 }}>🍕</div>
        <h2 style={{ fontSize:22, fontWeight:900, color:T.textDark, marginBottom:4 }}>
          {isEdit ? "Rating updated!" : savedList.length > 1 ? `${savedList.length} pizzas saved!` : "Rating saved!"}
        </h2>
        <div style={{ fontSize:13, color:T.textLight, marginBottom:20 }}>
          {restaurant}{(city||country) ? ` · 📍 ${[city,country].filter(Boolean).join(", ")}` : ""}
        </div>
        {/* Summary cards */}
        <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:24 }}>
          {savedList.map((p,i)=>(
            <div key={i} style={{ background:T.bgCard, border:`1px solid ${T.border}`,
              borderRadius:12, padding:"11px 14px",
              display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ textAlign:"left" }}>
                <div style={{ fontWeight:900, color:T.textDark, fontSize:14 }}>{p.pizzaName}</div>
                <div style={{ fontSize:11, color:T.textLight }}>{p.style}</div>
              </div>
              <ScoreBadge score={p.score} large/>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
          <button onClick={reset}
            style={{ padding:"11px 20px", borderRadius:12, fontWeight:900, fontSize:13,
              background:T.red, color:"white", border:"none", cursor:"pointer" }}>
            New session
          </button>
          <button onClick={()=>{ reset(); setPage("profile"); }}
            style={{ padding:"11px 20px", borderRadius:12, fontWeight:900, fontSize:13,
              background:"white", border:`2px solid ${T.amberMid}`, color:T.amberMid, cursor:"pointer" }}>
            My Profile
          </button>
        </div>
      </div>
    );
  }

  // Steps: 1=spot, 2=pizza name+style, 3=score, 4=notes — then queue review before final submit
  // For edit mode, just 3 steps (no queue)
  const totalSteps = 4;
  const progressStep = step;

  return (
    <div style={{ maxWidth:480, margin:"0 auto", padding:"24px 16px 100px",
      fontFamily:"Georgia,serif" }}>

      {/* Progress bar */}
      <div style={{ display:"flex", gap:5, marginBottom:24 }}>
        {Array(totalSteps).fill(0).map((_,i)=>(
          <div key={i} style={{ flex:1, height:4, borderRadius:99,
            background:progressStep>i?T.red:T.bgDeep, transition:"background 0.3s" }}/>
        ))}
      </div>

      {/* Queue mini-bar: shown during steps 2-4 when queue has items */}
      {!isEdit && queue.length > 0 && step > 1 && (
        <div style={{ background:T.bgDeep, borderRadius:10, padding:"8px 12px",
          marginBottom:16, display:"flex", alignItems:"center", gap:8,
          border:`1px solid ${T.border}` }}>
          <span style={{ fontSize:12, color:T.textMid, fontWeight:700 }}>
            🍕 {queue.length} pizza{queue.length>1?"s":""} queued
          </span>
          <div style={{ display:"flex", gap:5, flex:1, flexWrap:"wrap" }}>
            {queue.map((p,i)=>(

                      borderRadius:20, padding:"4px 10px" }}>
                      <span style={{ fontSize:12 }}>{icon}</span>

                  {flag:"🇹🇭",name:"Thailand"},{flag:"🇭🇰",name:"Hong Kong"},
                  {flag:"🇮🇹",name:"Italy"},{flag:"🇬🇧",name:"UK"},

                  textTransform:"none", letterSpacing:0 }}>— rate the place, not the pizza</span>

            </div>
            <button onClick={()=>setStep(2)}

      {/* STEP 2: Pizza ID — name, style, price (new session + edit) */}
      {step===2 && (

          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:13 }}>
            <div>
              <label style={{ fontSize:11, fontWeight:800, color:T.amberMid, display:"block",
                marginBottom:5, letterSpacing:"0.06em", textTransform:"uppercase" }}>Pizza Name</label>
              <AutocompleteInput value={pizzaName} onChange={setPizzaName}
                suggestions={pastPizzaNames} placeholder="e.g. Margherita" style={inp}/>
            </div>
            <div>
              <label style={{ fontSize:11, fontWeight:800, color:T.amberMid, display:"block",
                marginBottom:7, letterSpacing:"0.06em", textTransform:"uppercase" }}>Style</label>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {STYLES.map(s=>(
                  <button key={s} onClick={()=>setStyle(s)}
                    style={{ padding:"7px 12px", borderRadius:10, fontSize:12, fontWeight:800,
                      cursor:"pointer", transition:"all 0.13s",
                      border:`1.5px solid ${style===s?T.red:T.borderMed}`,
                      background:style===s?T.red:"white",
                      color:style===s?"white":T.textMid }}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize:11, fontWeight:800, color:T.amberMid, display:"block",
                marginBottom:5, letterSpacing:"0.06em", textTransform:"uppercase" }}>
                Price paid <span style={{fontWeight:400,color:T.textLight}}>(optional)</span>
              </label>
              <div style={{ display:"flex", gap:8 }}>
                <select value={currency} onChange={e=>setCurrency(e.target.value)}
                  style={{ ...inp, width:"auto", padding:"11px 10px", flexShrink:0, fontSize:13 }}>
                  {[["PHP","₱ PHP"],["USD","$ USD"],["JPY","¥ JPY"],["SGD","S$ SGD"],
                    ["THB","฿ THB"],["HKD","HK$ HKD"],["EUR","€ EUR"],["GBP","£ GBP"],
                    ["AUD","A$ AUD"]].map(([c,l])=>(
                    <option key={c} value={c}>{l}</option>

                </select>
                <input type="number" min="0" step="1" value={price}
                  onChange={e=>setPrice(e.target.value)}
                  placeholder="e.g. 450"
                  style={{ ...inp, flex:1 }}/>
              </div>
            </div>
            <button onClick={()=>setStep(3)} disabled={!pizzaName||!style}
              style={{ marginTop:6, padding:"13px", borderRadius:12, fontWeight:900, fontSize:15,
                background:T.red, color:"white", border:"none", cursor:"pointer",
                opacity:(!pizzaName||!style)?0.3:1 }}>
              Score It →
            </button>
          </div>
        </div>
      )}

      {/* STEP 3: Score categories */}
      {step===3 && (
        <div>
          <h2 style={{ fontSize:26, fontWeight:900, color:T.textDark, marginBottom:3 }}>
            Score each category
          </h2>
          <div style={{ fontSize:12, color:T.textLight, marginBottom:16 }}>
            {restaurant} · {pizzaName} · {style}
          </div>
          <div style={{ background:"white", borderRadius:16, padding:"2px 14px 6px",
            marginBottom:16, border:`1px solid ${T.border}`,
            boxShadow:"0 1px 8px rgba(180,100,30,0.08)" }}>
            {PIZZA_CATS.map(c=>(
              <CategoryRater key={c.key} cat={c} value={cats[c.key]}
                onChange={v=>setCats(p=>({...p,[c.key]:v}))}/>
            ))}
          </div>
          {overall>0 && (
            <div style={{ background:T.redLight, borderRadius:14, padding:"14px 16px",
              marginBottom:14, border:`1px solid rgba(201,59,10,0.2)`, textAlign:"center" }}>
              <div style={{ fontSize:10, fontWeight:900, color:T.red, letterSpacing:"0.1em",
                textTransform:"uppercase", marginBottom:8 }}>Overall</div>
              <PizzaFill score={overall} size={60}/>
              <div style={{ marginTop:8 }}>
                <ScoreLabel score={overall}/>
              </div>
            </div>
          )}
          <button onClick={()=>setStep(4)} disabled={!allCatsRated}
            style={{ width:"100%", padding:"13px", borderRadius:12, fontWeight:900, fontSize:15,
              background:T.red, color:"white", border:"none", cursor:"pointer",
              opacity:allCatsRated?1:0.3 }}>
            Write Your Verdict →
          </button>
        </div>
      )}

      {/* STEP 4: Notes + tags */}
      {step===4 && (
        <div>
          <h2 style={{ fontSize:26, fontWeight:900, color:T.textDark, marginBottom:3 }}>Pizza Bytes</h2>
          <div style={{ fontSize:12, color:T.textLight, marginBottom:14 }}>
            {restaurant} · {pizzaName} · {overall} overall
          </div>
          <textarea value={review} onChange={e=>setReview(e.target.value)}
            placeholder='"Perfect char, great crust chew."'
            style={{ ...inp, resize:"none", height:84, marginBottom:14 }}/>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:11, fontWeight:900, color:T.green, letterSpacing:"0.1em",
              textTransform:"uppercase", marginBottom:7 }}>🍕 The Good</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {POSITIVE_TAGS.map(t=>(
                <Tag key={t.label} label={t.label} icon={t.icon}
                  selected={selectedTags.includes(t.label)}
                  onClick={()=>toggleTag(t.label)} negative={false}/>
              ))}
            </div>
          </div>
          <div style={{ marginBottom:22 }}>
            <div style={{ fontSize:11, fontWeight:900, color:T.red, letterSpacing:"0.1em",
              textTransform:"uppercase", marginBottom:7 }}>🚫 The Bad</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {NEGATIVE_TAGS.map(t=>(
                <Tag key={t.label} label={t.label} icon={t.icon}
                  selected={selectedTags.includes(t.label)}
                  onClick={()=>toggleTag(t.label)} negative={true}/>
              ))}
            </div>
          </div>
          {isEdit ? (
            <button onClick={handleEditSave}
              style={{ width:"100%", padding:"14px", borderRadius:12, fontWeight:900,
                fontSize:15, background:T.red, color:"white", border:"none", cursor:"pointer",
                boxShadow:"0 4px 18px rgba(201,59,10,0.35)" }}>
              Save Changes ✓
            </button>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
              <button onClick={addToQueue}
                style={{ width:"100%", padding:"13px", borderRadius:12, fontWeight:900,
                  fontSize:14, background:T.red, color:"white", border:"none", cursor:"pointer",
                  boxShadow:"0 4px 18px rgba(201,59,10,0.3)" }}>
                ➕ Add &amp; rate another pizza here
              </button>
              <button onClick={handleSubmitAll}
                style={{ width:"100%", padding:"13px", borderRadius:12, fontWeight:900,
                  fontSize:14, background:"white", border:`2px solid ${T.amberMid}`,
                  color:T.amberMid, cursor:"pointer" }}>
                ✓ Done — save {queue.length > 0 ? `all ${queue.length+1} pizzas` : "rating"}
              </button>
            </div>
          )}
        </div>
      )}

      {/* STEP 5 (non-edit): Queue review before final save — reached via "Review →" in mini-bar */}
      {!isEdit && step===5 && (
        <div>
          <h2 style={{ fontSize:26, fontWeight:900, color:T.textDark, marginBottom:4 }}>
            Review your order
          </h2>
          <div style={{ fontSize:12, color:T.textLight, marginBottom:18 }}>
            📍 {restaurant} · {queue.length} pizza{queue.length!==1?"s":""}
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:22 }}>
            {queue.map((p,i)=>(
              <div key={i} style={{ background:T.bgCard, border:`1px solid ${T.border}`,
                borderRadius:12, padding:"11px 14px",
                display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontWeight:900, color:T.textDark, fontSize:14 }}>{p.pizzaName}</div>
                  <div style={{ fontSize:11, color:T.textLight }}>{p.style}</div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <ScoreBadge score={p.score}/>
                  <button onClick={()=>removeFromQueue(i)}
                    style={{ fontSize:11, color:T.textLight, background:"none", border:"none",
                      cursor:"pointer", padding:0 }}>✕</button>
                </div>
              </div>
            ))}
          </div>
          <button onClick={handleSubmitAll}
            style={{ width:"100%", padding:"14px", borderRadius:12, fontWeight:900,
              fontSize:15, background:T.red, color:"white", border:"none", cursor:"pointer",
              boxShadow:"0 4px 18px rgba(201,59,10,0.35)" }}>
            Save all {queue.length} pizza{queue.length!==1?"s":""}  🍕
          </button>
        </div>
      )}
    </div>
  );
}

// ─── EXPLORE PAGE ─────────────────────────────────────────────────────────────

function ExplorePage({ setPage, goRate, setSelectedPizza, setSelectedRestaurant, setSelectedUser,
                       allPizzas, allUsers, allRatings }) {
  const [tab, setTab]           = useState("pizzas");
  const [filter, setFilter]     = useState("All");
  const [search, setSearch]     = useState("");
  const [locFilter, setLocFilter] = useState("");
  const [sort, setSort]         = useState("score");

  // Derive restaurants from ratings (no object shape issues)
  const restaurantData = {};
  allRatings.forEach(r => {
    if (!restaurantData[r.restaurant]) {
      restaurantData[r.restaurant] = { name:r.restaurant, pizzaNames:new Set(), city:r.city||"", country:r.country||"" };
    }
    restaurantData[r.restaurant].pizzaNames.add(r.pizzaName);
  });
  const restaurants = Object.values(restaurantData).map(r => ({
    name: r.name, city: r.city, country: r.country,
    pizzaCount: r.pizzaNames.size,
    pizzas: allPizzas.filter(p=>p.restaurant===r.name),
  })).sort((a,b)=>{
    const avgA = a.pizzas.length ? a.pizzas.reduce((s,p)=>s+p.score,0)/a.pizzas.length : 0;
    const avgB = b.pizzas.length ? b.pizzas.reduce((s,p)=>s+p.score,0)/b.pizzas.length : 0;
    return avgB-avgA;
  });

  // All known locations for filter chips
  const allLocations = [...new Set(allRatings.flatMap(r=>[r.city,r.country].filter(Boolean)))].sort();

  const filtered = allPizzas
    .filter(p=>filter==="All"||p.style===filter)
    .filter(p=>!search||`${p.restaurant} ${p.name}`.toLowerCase().includes(search.toLowerCase()))
    .filter(p=>!locFilter||[p.city,p.country].some(l=>l&&l.toLowerCase().includes(locFilter.toLowerCase())))
    .sort((a,b)=>{
      if (sort==="score") return b.score-a.score;
      if (sort==="ratingCount") return b.ratingCount-a.ratingCount;
      // value sorts: use the avg value ratio of all ratings for this pizza
      const vA = a.ratings.map(r=>valueRatio(r.score,r.price,r.currency)).filter(v=>v!==null);
      const vB = b.ratings.map(r=>valueRatio(r.score,r.price,r.currency)).filter(v=>v!==null);
      const avgA = vA.length ? vA.reduce((x,y)=>x+y,0)/vA.length : null;
      const avgB = vB.length ? vB.reduce((x,y)=>x+y,0)/vB.length : null;
      // pizzas without price go to the end
      if (avgA===null && avgB===null) return 0;
      if (avgA===null) return 1;
      if (avgB===null) return -1;
      return sort==="value_best" ? avgB-avgA : avgA-avgB;
    });

  // Style leaderboard — top 3 per style
  const styleLeaders = {};
  STYLES.forEach(s=>{
    const top = allPizzas.filter(p=>p.style===s).sort((a,b)=>b.score-a.score).slice(0,3);
    if (top.length) styleLeaders[s] = top;
  });

  // Location leaderboard — top pizza per city
  const cityLeaders = {};
  allPizzas.forEach(p=>{
    if (!p.city) return;
    if (!cityLeaders[p.city]||p.score>cityLeaders[p.city].score) cityLeaders[p.city]=p;
  });

  // Hall of Shame — bottom 5 pizzas
  const shameList = [...allPizzas].sort((a,b)=>a.score-b.score).slice(0,5);

  const tabs = [["pizzas","Pizzas"],["restaurants","Spots"],["users","Inspectors"],["leaderboard","🏆 Board"]];

  return (
    <div style={{ maxWidth:640, margin:"0 auto", padding:"24px 16px 90px",
      fontFamily:"Georgia,serif" }}>
      <h2 style={{ fontSize:22, fontWeight:900, color:T.textDark, marginBottom:14 }}>Explore</h2>

      {/* Tab bar */}
      <div style={{ display:"flex", marginBottom:16, borderRadius:12, overflow:"hidden",
        border:`1px solid ${T.borderMed}`, background:T.bgDeep }}>
        {tabs.map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{ flex:1, padding:"10px 4px", fontSize:11, fontWeight:900, cursor:"pointer",
              border:"none", background:tab===id?"white":"transparent",
              color:tab===id?T.red:T.textLight,
              borderBottom:tab===id?`2px solid ${T.red}`:"2px solid transparent",
              transition:"all 0.13s" }}>
            {label}
          </button>
        ))}
      </div>

      {/* PIZZAS TAB */}
      {tab==="pizzas" && (
        <>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search restaurants or pizzas..."
            style={{ width:"100%", borderRadius:12, padding:"10px 13px", color:T.textDark,
              outline:"none", background:"white", border:`1.5px solid ${T.borderMed}`,
              marginBottom:10, boxSizing:"border-box", fontFamily:"Georgia,serif" }}/>
          <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:8 }}>
            {["All",...STYLES].map(s=>(
              <button key={s} onClick={()=>setFilter(s)}
                style={{ padding:"5px 10px", borderRadius:9, fontSize:11, fontWeight:800,
                  cursor:"pointer",
                  border:`1px solid ${filter===s?T.red:T.borderMed}`,
                  background:filter===s?T.red:"white",
                  color:filter===s?"white":T.textMid }}>
                {s}
              </button>
            ))}
          </div>
          <div style={{ display:"flex", gap:5, marginBottom:14 }}>
            {[["score","Top Rated"],["ratingCount","Most Rated"],["value_best","Best Value 🎯"],["value_worst","Least Value 💸"]].map(([v,l])=>(
              <button key={v} onClick={()=>setSort(v)}
                style={{ padding:"5px 11px", borderRadius:9, fontSize:11, fontWeight:800,
                  cursor:"pointer", border:`1px solid ${sort===v?T.amberMid:"transparent"}`,
                  background:T.bgDeep, color:sort===v?T.amberMid:T.textLight }}>
                {l}
              </button>
            ))}
          </div>
          {allLocations.length>0 && (
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:10, fontWeight:800, color:T.textLight, letterSpacing:"0.07em",
                textTransform:"uppercase", marginBottom:6 }}>📍 Filter by Location</div>
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                <button onClick={()=>setLocFilter("")}
                  style={{ padding:"4px 10px", borderRadius:9, fontSize:11, fontWeight:800,
                    cursor:"pointer", border:`1px solid ${locFilter===""?T.amberMid:T.borderMed}`,
                    background:locFilter===""?T.amberMid:"white",
                    color:locFilter===""?"white":T.textMid }}>
                  All
                </button>
                {allLocations.map(loc=>(
                  <button key={loc} onClick={()=>setLocFilter(locFilter===loc?"":loc)}
                    style={{ padding:"4px 10px", borderRadius:9, fontSize:11, fontWeight:800,
                      cursor:"pointer",
                      border:`1px solid ${locFilter===loc?T.amberMid:T.borderMed}`,
                      background:locFilter===loc?T.amberMid:"white",
                      color:locFilter===loc?"white":T.textMid }}>
                    {loc}
                  </button>
                ))}
              </div>
            </div>
          )}
          {filtered.length===0
            ? <EmptyState icon="🔍" title="No pizzas yet"
                sub={filter!=="All"?`No ${filter} pizzas rated yet.`:"Rate your first pizza to see it here."}
                action="Rate a Pizza" onAction={goRate}/>
            : <div style={{ display:"grid", gap:9 }}>
                {filtered.map((p,i)=>(
                  <div key={p.id} style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ fontSize:14, fontWeight:900, width:18, textAlign:"right",
                      color:T.textLight }}>#{i+1}</div>
                    <div style={{ flex:1 }}>
                      <PizzaCard pizza={p} onClick={pizza=>{setSelectedPizza(pizza);setPage("pizza");}}/>
                    </div>
                  </div>
                ))}
              </div>
          }
        </>
      )}

      {/* RESTAURANTS TAB */}
      {tab==="restaurants" && (
        restaurants.length===0
          ? <EmptyState icon="🏠" title="No restaurants yet"
              sub="Restaurants appear when someone rates a pizza from there."
              action="Rate a Pizza" onAction={goRate}/>
          : <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {restaurants.map(r=>{
                const restRatings = allRatings.filter(x=>x.restaurant===r.name);
                const avgScore = r.pizzas.length ? Math.round(r.pizzas.reduce((a,p)=>a+p.score,0)/r.pizzas.length) : 0;
                const scores = restRatings.map(x=>x.score);

                const catAvgs = {};
                CATEGORIES.forEach(c=>{
                  const vals = restRatings.map(x=>{
                    const cats2 = typeof x.cats === "string" ? JSON.parse(x.cats) : (x.cats||{});
                    return cats2[c.key];
                  }).filter(v=>typeof v === "number" && v > 0);
                  catAvgs[c.key] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
                });
                return (
                  <div key={r.name}
                    onClick={()=>{setSelectedRestaurant(r.name);setPage("restaurant");}}
                    style={{ borderRadius:14, cursor:"pointer", background:T.bgCard,
                      border:`1px solid ${T.border}`, overflow:"hidden",
                      boxShadow:"0 1px 6px rgba(180,100,30,0.07)" }}>
                    {/* Header row */}
                    <div style={{ display:"flex", justifyContent:"space-between",
                      alignItems:"flex-start", padding:"13px 15px 10px" }}>
                      <div>
                        <div style={{ fontWeight:900, color:T.textDark, fontSize:15 }}>{r.name}</div>
                        {(r.city||r.country) && (
                          <div style={{ fontSize:11, color:T.textLight, marginTop:1 }}>
                            📍 {[r.city,r.country].filter(Boolean).join(", ")}
                          </div>
                        )}
                        <div style={{ fontSize:11, color:T.textLight, marginTop:4, display:"flex", flexWrap:"wrap", gap:6 }}>
                          <span>{restRatings.length} visit{restRatings.length!==1?"s":""}</span>
                          <span>·</span>
                          <span>{r.pizzaCount} pizza{r.pizzaCount!==1?"s":""}</span>

                        </div>
                      </div>
                      {avgScore>0 && (
                        <div style={{ textAlign:"right", flexShrink:0 }}>
                          <ScoreBadge score={avgScore} large/>

// ─── RESTAURANT PAGE ──────────────────────────────────────────────────────────

function RestaurantPage({ restaurant, allPizzas, allRatings, setSelectedPizza, setPage }) {
  const [tab, setTab] = useState("menu");
  const pizzas = allPizzas.filter(p=>p.restaurant===restaurant).sort((a,b)=>b.score-a.score);
  const visits = (allRatings||[]).filter(r=>r.restaurant===restaurant).sort((a,b)=>0);
  const avg = pizzas.length ? Math.round(pizzas.reduce((a,p)=>a+p.score,0)/pizzas.length) : 0;
  const loc = visits.length ? [visits[0].city, visits[0].country].filter(Boolean).join(", ") : "";

  if (!restaurant) return <EmptyState icon="🏠" title="No restaurant selected" sub=""/>;

  const catAvgs = {};
  CATEGORIES.forEach(c=>{
    const vals = visits.map(r=>{
      const cats2 = typeof r.cats === "string" ? JSON.parse(r.cats) : (r.cats||{});
      return cats2[c.key];
    }).filter(v=>typeof v === "number" && v > 0);
    catAvgs[c.key] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  });

  return (
    <div style={{ maxWidth:600, margin:"0 auto", padding:"0 0 90px", fontFamily:"Georgia,serif" }}>
      {/* Header */}
      <div style={{ background:"linear-gradient(160deg,#1a0a02,#2d1208)",
        padding:"32px 20px 24px", textAlign:"center", position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", right:-10, bottom:-10, fontSize:100,
          opacity:0.06, transform:"rotate(-10deg)", pointerEvents:"none" }}>🏠</div>
        <div style={{ position:"relative", zIndex:1 }}>
          {avg>0 && <PizzaFill score={avg} size={70}/>}
          <h2 style={{ fontSize:24, fontWeight:900, color:"white", margin:"10px 0 2px",
            letterSpacing:"-0.5px" }}>{restaurant}</h2>
          {loc && <div style={{ fontSize:12, color:"rgba(245,220,190,0.6)", marginBottom:6 }}>📍 {loc}</div>}
          <div style={{ display:"flex", justifyContent:"center", gap:24, marginTop:8 }}>
            <div>
              <div style={{ fontSize:22, fontWeight:900, color:"#e8390e" }}>{avg||"—"}</div>
              <div style={{ fontSize:10, color:"rgba(245,220,190,0.5)", textTransform:"uppercase", letterSpacing:"0.07em" }}>avg score</div>
            </div>
            <div>
              <div style={{ fontSize:22, fontWeight:900, color:"rgba(245,220,190,0.9)" }}>{pizzas.length}</div>
              <div style={{ fontSize:10, color:"rgba(245,220,190,0.5)", textTransform:"uppercase", letterSpacing:"0.07em" }}>pizza{pizzas.length!==1?"s":""}</div>
            </div>
            <div>
              <div style={{ fontSize:22, fontWeight:900, color:"rgba(245,220,190,0.9)" }}>{visits.length}</div>
              <div style={{ fontSize:10, color:"rgba(245,220,190,0.5)", textTransform:"uppercase", letterSpacing:"0.07em" }}>visit{visits.length!==1?"s":""}</div>
            </div>
          </div>
        </div>
      </div>

      {/* Category mini-bars */}
      {visits.length > 0 && (
        <div style={{ background:T.bgDeep, padding:"12px 20px",
          borderBottom:`1px solid ${T.border}`,
          display:"grid", gridTemplateColumns:"1fr 1fr", gap:"5px 16px" }}>
          {CATEGORIES.map(c=>(
            <div key={c.key} style={{ display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ fontSize:12 }}>{c.icon}</span>
              <div style={{ flex:1, height:4, borderRadius:99, background:"rgba(180,120,60,0.15)" }}>
                <div style={{ width:`${(catAvgs[c.key]/5)*100}%`, height:"100%", borderRadius:99,
                  background:catAvgs[c.key]>=4?T.green:catAvgs[c.key]>=3?T.amberMid:T.red }}/>
              </div>
              <span style={{ fontSize:10, fontWeight:800, color:T.textLight, width:24, textAlign:"right" }}>
                {catAvgs[c.key]>0 ? catAvgs[c.key].toFixed(1) : "—"}
              </span>
            </div>
          ))}
        </div>
      )}

      {/* Tabs */}
      <div style={{ display:"flex", borderBottom:`1px solid ${T.border}`,
        background:T.bgCard, padding:"0 20px" }}>
        {[["menu","🍕 Menu"],["visits","📋 Visits"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{ padding:"11px 16px", fontSize:13, fontWeight:800, cursor:"pointer",
              background:"none", border:"none", borderBottom:`2px solid ${tab===id?T.red:"transparent"}`,
              color:tab===id?T.red:T.textLight, transition:"all 0.13s", marginRight:4 }}>
            {label}
          </button>
        ))}
      </div>

      <div style={{ padding:"16px 16px 0" }}>
        {/* MENU TAB */}
        {tab==="menu" && (
          pizzas.length===0
            ? <EmptyState icon="🍕" title="No pizzas rated here yet" sub=""/>
            : <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {pizzas.map((p,i)=>(
                  <div key={p.id} style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ fontSize:12, fontWeight:900, width:18, color:T.textLight,
                      flexShrink:0 }}>#{i+1}</div>
                    <div style={{ flex:1 }}>
                      <PizzaCard pizza={p} onClick={pizza=>{setSelectedPizza(pizza);setPage("pizza");}}/>
                    </div>
                  </div>
                ))}
              </div>
        )}

        {/* VISITS TAB */}
        {tab==="visits" && (
          visits.length===0
            ? <EmptyState icon="📋" title="No visit history yet" sub=""/>
            : <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
                {visits.map((r,i)=>{
                  const vl = r.price ? valueLabel(r.score, r.price, r.currency) : null;
                  return (
                    <div key={r.id||i} style={{ borderRadius:12, padding:"12px 14px",
                      background:T.bgCard, border:`1px solid ${T.border}` }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontWeight:900, color:T.textDark, fontSize:14 }}>{r.pizzaName}</div>
                          <div style={{ fontSize:11, color:T.textLight, marginTop:1, display:"flex", gap:8, flexWrap:"wrap" }}>
                            <span>{r.style}</span>
                            <span>·</span>
                            <span style={{ fontWeight:700, color:T.amberMid }}>@{r.user}</span>
                            <span>·</span>
                            <span>{r.date}</span>
                            {r.price && <span>· {r.currency==="PHP"?"₱":r.currency==="USD"?"$":r.currency==="JPY"?"¥":r.currency==="EUR"?"€":r.currency}{r.price}</span>}
                            {vl && <span style={{ color:vl.color, fontWeight:700 }}>{vl.text}</span>}
                          </div>
                          {r.review && (
                            <p style={{ fontSize:12, color:T.textMid, margin:"6px 0 0",
                              fontStyle:"italic", borderLeft:`2px solid ${T.border}`, paddingLeft:8 }}>
                              "{r.review}"
                            </p>
                          )}
                        </div>
                        <ScoreBadge score={r.score}/>
                      </div>
                    </div>
                  );
                })}
              </div>
        )}
      </div>
    </div>
  );
}

  const locked = BADGE_DEFS.filter(b=>!earned.find(e=>e.id===b.id));
  return (
    <div style={{ marginBottom:8 }}>
      {earned.length > 0 && (
        <div style={{ display:"flex", flexWrap:"wrap", gap:7, justifyContent:"center", marginBottom:10 }}>
          {earned.map(b=>(
            <div key={b.id} title={b.desc}
              style={{ display:"flex", flexDirection:"column", alignItems:"center",
                background:"linear-gradient(135deg,rgba(201,59,10,0.09),rgba(184,134,11,0.09))",
                border:"1.5px solid rgba(201,59,10,0.2)", borderRadius:12,
                padding:"8px 10px", minWidth:60, gap:3 }}>
              <span style={{ fontSize:22 }}>{b.icon}</span>
              <span style={{ fontSize:9, fontWeight:800, color:T.textDark,
                textAlign:"center", lineHeight:1.2, maxWidth:56 }}>{b.name}</span>

          ))}
        </div>
      )}
      {locked.length > 0 && (
        <div style={{ display:"flex", flexWrap:"wrap", gap:4, justifyContent:"center", opacity:0.38 }}>
          {locked.map(b=>(
            <div key={b.id} title={b.desc}
              style={{ display:"flex", alignItems:"center", gap:3, padding:"3px 9px",
                borderRadius:99, border:"1px dashed rgba(180,120,60,0.4)" }}>
              <span style={{ fontSize:12, filter:"grayscale(1)" }}>{b.icon}</span>
              <span style={{ fontSize:10, fontWeight:700, color:T.textLight }}>{b.name}</span>
            </div>
          ))}
        </div>
      )}

  );
}

// ─── PROFILE PAGE ─────────────────────────────────────────────────────────────

function ProfilePage({ username, isMe, myRatings, deleteRating, setPage, goRate, setSelectedPizza,
                       allPizzaMap, setEditingRating }) {
  const [confirmDelete, setConfirmDelete] = useState(null);
  const rated = myRatings.length;
  const level = getLevel(rated);
  const avg   = rated>0 ? Math.round(myRatings.reduce((a,r)=>a+r.score,0)/rated) : "—";

  function handleDelete(id) {
    if (confirmDelete===id) { deleteRating(id); setConfirmDelete(null); }
    else setConfirmDelete(id);
  }

  return (
    <div style={{ maxWidth:600, margin:"0 auto", padding:"24px 16px 90px",
      fontFamily:"Georgia,serif" }}>
      <div style={{ textAlign:"center", marginBottom:20 }}>
        <div style={{ fontSize:48, marginBottom:6 }}>{level.icon}</div>
        <h2 style={{ fontSize:22, fontWeight:900, color:T.textDark, marginBottom:2 }}>
          @{username}
        </h2>
        <div style={{ fontSize:12, fontWeight:800, color:T.red, marginBottom:14 }}>
          {level.label}
        </div>
        <div style={{ display:"flex", justifyContent:"center", gap:40, marginBottom:16 }}>
          <div>
            <div style={{ fontSize:28, fontWeight:900, color:T.textDark }}>{rated}</div>
            <div style={{ fontSize:10, color:T.textLight }}>Pizzas Rated</div>
          </div>
          <div>
            <div style={{ fontSize:28, fontWeight:900, color:T.textDark }}>{avg}</div>
            <div style={{ fontSize:10, color:T.textLight }}>Avg Score</div>
          </div>
        </div>
        {/* Badges */}
        {rated > 0 && (
          <BadgesDisplay myRatings={myRatings}/>
        )}
      </div>

      {rated===0
        ? <EmptyState icon="🍕"
            title={isMe?"You haven't rated any pizzas yet":`@${username} hasn't rated anything yet`}
            sub={isMe?"Every pizza you rate shows up here.":""}
            action={isMe?"Rate Your First Pizza":null}
            onAction={goRate}/>
        : <>
            <div style={{ fontSize:11, fontWeight:900, color:T.red, letterSpacing:"0.1em",
              textTransform:"uppercase", marginBottom:10 }}>
              {isMe?"Your Ratings":"Ratings"}
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {[...myRatings].reverse().map((r,i)=>(
                <div key={r.id||i} style={{ borderRadius:14, overflow:"hidden",
                  background:confirmDelete===r.id?T.deleteBg:"white",
                  border:`1px solid ${confirmDelete===r.id?"rgba(201,59,10,0.3)":T.border}`,
                  transition:"all 0.2s" }}>
                  {/* Letterboxd-style: score block left, content right */}
                  <div style={{ display:"flex", alignItems:"stretch" }}>
                    {/* Score column */}
                    <div onClick={()=>{ const key=`${r.restaurant}|||${r.pizzaName}`; if(allPizzaMap&&allPizzaMap[key]){setSelectedPizza(allPizzaMap[key]);setPage("pizza");}}}
                      style={{ width:72, flexShrink:0, cursor:"pointer",
                        background:"transparent",
                        display:"flex", flexDirection:"column", alignItems:"center",
                        justifyContent:"center", padding:"14px 8px", gap:5,
                        borderRight:`1px solid ${T.border}` }}>
                      <PizzaFill score={r.score} size={44}/>
                      <span style={{ fontSize:10, fontWeight:800, color:scoreTier(r.score).color,
                        textAlign:"center", lineHeight:1.2, maxWidth:60 }}>
                        {scoreTier(r.score).label}
                      </span>
                    </div>
                    {/* Content column */}
                    <div style={{ flex:1, padding:"12px 13px", minWidth:0 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                        <div style={{ flex:1, cursor:"pointer", minWidth:0 }}
                          onClick={()=>{ const key=`${r.restaurant}|||${r.pizzaName}`; if(allPizzaMap&&allPizzaMap[key]){setSelectedPizza(allPizzaMap[key]);setPage("pizza");}}}>
                          <div style={{ fontWeight:900, color:T.textDark, fontSize:14, lineHeight:1.3 }}>
                            {r.restaurant}
                          </div>
                          <div style={{ fontSize:12, color:T.amberMid, fontWeight:700, marginBottom:2 }}>
                            {r.pizzaName}
                          </div>
                          <div style={{ fontSize:10, color:T.textLight, marginBottom:6 }}>
                            {r.style}{r.city||r.country ? ` · 📍 ${[r.city,r.country].filter(Boolean).join(", ")}` : ""} · {r.date}
                          </div>
                          {r.review && (
                            <p style={{ fontSize:12, color:T.textMid, margin:0,
                              fontStyle:"italic", lineHeight:1.5,
                              borderLeft:`2px solid ${T.border}`, paddingLeft:8 }}>

                            <div style={{ display:"flex", flexWrap:"wrap", gap:3, marginTop:6 }}>
                              {r.tags.slice(0,3).map(t=>{
                                const neg = NEGATIVE_TAGS.some(n=>n.label===t);
                                const tag = ALL_TAGS.find(x=>x.label===t)||{icon:"🍕",label:t};
                                return (
                                  <span key={t} style={{ fontSize:10, padding:"2px 7px",
                                    borderRadius:99, fontWeight:800,
                                    background:neg?"rgba(201,59,10,0.08)":"rgba(45,138,78,0.08)",
                                    color:neg?T.red:T.green }}>

                          )}

                        {isMe && (
                          <div style={{ display:"flex", gap:4, flexShrink:0, marginLeft:8 }}>
                            <button onClick={()=>{ setEditingRating(r); setPage("rate"); }}
                              style={{ padding:"3px 8px", borderRadius:7, fontSize:10, fontWeight:800,
                                cursor:"pointer", border:`1px solid ${T.amberMid}`,
                                background:"transparent", color:T.amberMid }}>
                              Edit
                            </button>
                            <button onClick={()=>handleDelete(r.id)}
                              style={{ padding:"3px 8px", borderRadius:7, fontSize:10, fontWeight:800,
                                cursor:"pointer",
                                border:`1px solid ${confirmDelete===r.id?T.red:T.borderMed}`,
                                background:confirmDelete===r.id?T.deleteBg:"transparent",
                                color:confirmDelete===r.id?T.red:T.textLight }}>
                              {confirmDelete===r.id?"Sure?":"Delete"}
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                  {confirmDelete===r.id && (
                    <div style={{ fontSize:11, color:T.red, padding:"8px 14px",
                      borderTop:`1px solid rgba(201,59,10,0.15)`,
                      display:"flex", gap:8, alignItems:"center" }}>
                      <span>Delete this rating?</span>
                      <button onClick={()=>setConfirmDelete(null)}
                        style={{ fontSize:11, color:T.textLight, background:"none",
                          border:"none", cursor:"pointer", padding:0 }}>
                        Cancel
                      </button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </>
      }
    </div>
  );
}

const supa = {
  async query(table, opts={}) {
    let url = `${SUPA_URL}/rest/v1/${table}?`;
    if (opts.select)  url += `select=${opts.select}&`;
    if (opts.filter)  url += `${opts.filter}&`;
    if (opts.order)   url += `order=${opts.order}&`;
    const res = await fetch(url, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`,
        "Content-Type": "application/json", Prefer: "return=representation" }
    });
    return res.json();
  },
  async insert(table, data) {
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: "POST",
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`,
        "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(data)
    });
    return res.json();
  },
  async update(table, id, data) {
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: "PATCH",
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`,
        "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(data)
    });
    return res.json();
  },
  async delete(table, id) {
    await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: "DELETE",
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
    });
  }
};

// ─── AUTH SCREENS ─────────────────────────────────────────────────────────────

function AuthScreen({ onLogin }) {
  const [mode, setMode]       = useState("login"); // "login" | "signup"
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError]     = useState("");
  const [loading, setLoading] = useState(false);
  const [shake, setShake]     = useState(false);

  const inp = { width:"100%", borderRadius:12, padding:"13px 15px", color:T.textDark,
    outline:"none", background:"white", border:`1.5px solid rgba(180,120,60,0.3)`,
    fontSize:15, boxSizing:"border-box", fontFamily:"Georgia,serif" };

  async function handleSubmit() {
    const u = username.trim().toLowerCase();
    const p = password.trim();
    if (!u || !p) { setError("Fill in both fields."); return; }
    if (mode==="signup" && u.length < 2) { setError("Username must be at least 2 characters."); return; }
    if (mode==="signup" && !/^[a-z0-9_]+$/.test(u)) { setError("Username: letters, numbers, underscores only."); return; }
    if (mode==="signup" && p.length < 4) { setError("Password must be at least 4 characters."); return; }
    setLoading(true); setError("");
    try {
      if (mode==="signup") {
        // Check username taken
        const existing = await supa.query("users", { select:"id", filter:`username=eq.${u}` });
        if (existing.length > 0) { setError("Username taken — try another."); setLoading(false); doShake(); return; }
        const created = await supa.insert("users", { username:u, password:p });
        if (created?.error) { setError(created.error.message); setLoading(false); doShake(); return; }
        onLogin({ id: created[0].id, username: u });
      } else {
        const users = await supa.query("users", { select:"id,username,password", filter:`username=eq.${u}` });
        if (!users.length || users[0].password !== p) {
          setError("Wrong username or password."); doShake(); setLoading(false); return;
        }
        onLogin({ id: users[0].id, username: u });
      }
    } catch(e) {
      setError("Connection error — check your internet."); doShake();
    }
    setLoading(false);
  }

  function doShake() { setShake(true); setTimeout(()=>setShake(false), 600); }

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#0f0501,#1e0a03,#2a0f04)",
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
      padding:"24px", fontFamily:"Georgia,serif" }}>
      {/* Logo */}
      <div style={{ textAlign:"center", marginBottom:36 }}>
        <div style={{ fontSize:52, marginBottom:10 }}>🍕</div>
        <h1 style={{ fontFamily:"Georgia,serif", fontWeight:900, letterSpacing:"-2px",
          fontSize:"clamp(36px,9vw,64px)", color:"#e8390e",
          textShadow:"0 0 60px rgba(232,57,14,0.4)", lineHeight:0.95, marginBottom:6 }}>
          In Crust<br/>We Trust
        </h1>
        <p style={{ fontSize:13, color:"rgba(245,220,190,0.45)", fontStyle:"italic" }}>
          Pizza never lies.
        </p>
      </div>

      {/* Card */}
      <div style={{ width:"100%", maxWidth:380,
        background:"rgba(253,246,236,0.97)", borderRadius:20,
        padding:"28px 24px", boxShadow:"0 20px 60px rgba(0,0,0,0.4)" }}>
        {/* Mode toggle */}
        <div style={{ display:"flex", background:T.bgDeep, borderRadius:12,
          padding:3, marginBottom:22, gap:3 }}>
          {[["login","Sign In"],["signup","Create Account"]].map(([m,l])=>(
            <button key={m} onClick={()=>{ setMode(m); setError(""); }}
              style={{ flex:1, padding:"9px", borderRadius:9, fontSize:13, fontWeight:800,
                cursor:"pointer", border:"none", transition:"all 0.15s",
                background:mode===m?"white":"transparent",
                color:mode===m?T.red:T.textLight,
                boxShadow:mode===m?"0 1px 4px rgba(0,0,0,0.1)":"none" }}>
              {l}
            </button>
          ))}
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:12,
          animation: shake ? "shake 0.5s" : "none" }}>
          <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}`}</style>
          <div>
            <label style={{ fontSize:11, fontWeight:800, color:T.amberMid, display:"block",
              marginBottom:5, letterSpacing:"0.06em", textTransform:"uppercase" }}>Username</label>
            <input value={username} onChange={e=>setUsername(e.target.value.toLowerCase())}
              onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
              placeholder="e.g. pizzalover99" style={inp} autoCapitalize="none" autoCorrect="off"/>
          </div>
          <div>
            <label style={{ fontSize:11, fontWeight:800, color:T.amberMid, display:"block",
              marginBottom:5, letterSpacing:"0.06em", textTransform:"uppercase" }}>Password</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
              placeholder="••••••••" style={inp}/>
          </div>
          {error && (
            <div style={{ fontSize:12, color:T.red, fontWeight:700, textAlign:"center",
              background:T.redLight, borderRadius:8, padding:"8px 12px" }}>
              {error}
            </div>
          )}
          <button onClick={handleSubmit} disabled={loading}
            style={{ marginTop:4, padding:"14px", borderRadius:12, fontWeight:900,
              fontSize:15, background: loading ? T.borderMed : T.red,
              color:"white", border:"none", cursor: loading ? "default" : "pointer",
              boxShadow: loading ? "none" : "0 4px 20px rgba(201,59,10,0.4)",
              transition:"all 0.15s" }}>
            {loading ? "…" : mode==="login" ? "Sign In 🍕" : "Create Account 🍕"}
          </button>
        </div>

        {mode==="signup" && (
          <p style={{ fontSize:11, color:T.textLight, textAlign:"center", marginTop:14,
            lineHeight:1.5 }}>
            🔒 Private beta. Invite only.<br/>Your ratings are saved across devices.
          </p>
        )}
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────

function App() {
  const [currentUser, setCurrentUser]         = useState(null); // { id, username }
  const [page, setPage]                       = useState("home");
  const [selectedPizza, setSelectedPizza]     = useState(null);
  const [selectedUser, setSelectedUser]       = useState(null);
  const [selectedRestaurant, setSelectedRestaurant] = useState(null);
  const [allRatings, setAllRatings]           = useState([]);
  const [editingRating, setEditingRating]     = useState(null);
  const [loadingRatings, setLoadingRatings]   = useState(false);

  const username = currentUser?.username || null;

  // Load all ratings from Supabase on login
  const { useEffect } = React;
  useEffect(() => {
    if (!currentUser) return;
    setLoadingRatings(true);
    supa.query("ratings", { select:"*", order:"created_at.asc" })
      .then(rows => {
        if (!rows || rows.error) return;
        // Map snake_case DB cols → camelCase app shape
        setAllRatings(rows.map(r => ({
          id:         r.id,
          user:       r.username,
          restaurant: r.restaurant,
          pizzaName:  r.pizza_name,
          style:      r.style,
          city:       r.city,
          country:    r.country,
          score:      r.score,
          cats:       r.cats || {},
          review:     r.review,
          tags:       r.tags || [],
          price:      r.price,
          currency:   r.currency || "PHP",
          date:       r.date,
        })));
      })
      .finally(() => setLoadingRatings(false));
  }, [currentUser]);

  if (!currentUser) return <AuthScreen onLogin={setCurrentUser}/>;

  if (loadingRatings) return (
    <div style={{ minHeight:"100vh", background:T.bg, display:"flex",
      alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12,
      fontFamily:"Georgia,serif" }}>
      <div style={{ fontSize:40 }}>🍕</div>
      <div style={{ fontSize:14, color:T.textLight }}>Loading your pizza history…</div>
    </div>
  );

  // ── Derive all data from allRatings ──────────────────────────────────────
  const myRatings = allRatings.filter(r=>(r.user||"").toLowerCase()===(username||"").toLowerCase());

  // Build pizza map
  const pizzaMap = {};
  allRatings.forEach(r => {
    const key = `${r.restaurant}|||${r.pizzaName}`;
    if (!pizzaMap[key]) {
      pizzaMap[key] = {
        id: key, restaurant:r.restaurant, name:r.pizzaName, style:r.style,
        city: r.city||"", country: r.country||"", ratings:[]
      };
    }
    pizzaMap[key].ratings.push(r);
  });

  const allPizzas = Object.values(pizzaMap).map(p => {
    const n = p.ratings.length;
    const score = Math.round(p.ratings.reduce((a,r)=>a+r.score,0)/n);
    // Average each category — safely parse cats (Supabase returns JSON objects)
    const cats = {};
    CATEGORIES.forEach(c => {
      const vals = p.ratings.map(r=>{
        const c2 = typeof r.cats === "string" ? JSON.parse(r.cats) : (r.cats||{});
        return c2[c.key];
      }).filter(v=>typeof v === "number" && v > 0);
      cats[c.key] = vals.length ? Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*2)/2 : 0;
    });
    // Aggregate tags
    const tagCounts = {};
    p.ratings.forEach(r=>(r.tags||[]).forEach(t=>{ tagCounts[t]=(tagCounts[t]||0)+1; }));
    const tags = Object.entries(tagCounts)
      .sort((a,b)=>b[1]-a[1]).slice(0,4)
      .map(([label])=>ALL_TAGS.find(t=>t.label===label)||{label,icon:"🍕"});
    const reviews = p.ratings
      .map(r=>({ user:r.user, score:r.score, text:r.review||"" }))
      .filter(r=>r.text);
    return { ...p, score, cats, tags, reviews, ratingCount:n };
  }).sort((a,b)=>b.score-a.score);

  // Build user list
  const userMap = {};
  allRatings.forEach(r=>{
    if (!userMap[r.user]) userMap[r.user]={ username:r.user, ratings:[] };
    userMap[r.user].ratings.push(r);
  });
  const allUsers = Object.values(userMap).map(u=>({
    username: u.username,
    rated: u.ratings.length,
    avg: Math.round(u.ratings.reduce((a,r)=>a+r.score,0)/u.ratings.length),
  })).sort((a,b)=>b.rated-a.rated);

  async function addRating(r) {
    // Optimistic update
    const tempId = "temp-" + Date.now();
    const optimistic = { ...r, user:username, id:tempId };
    setAllRatings(prev => [...prev, optimistic]);
    try {
      const rows = await supa.insert("ratings", {
        user_id:    currentUser.id,
        username:   username,
        restaurant: r.restaurant,
        pizza_name: r.pizzaName,
        style:      r.style,
        city:       r.city,
        country:    r.country,
        score:      r.score,
        cats:       r.cats,
        review:     r.review,
        tags:       r.tags,
        price:      r.price,
        currency:   r.currency,
        date:       r.date,
      });
      if (rows && rows[0]) {
        // Replace temp with real DB id
        setAllRatings(prev => prev.map(x =>
          x.id === tempId ? { ...optimistic, id: rows[0].id } : x
        ));
      }
    } catch(e) {
      // Rollback on error
      setAllRatings(prev => prev.filter(x => x.id !== tempId));
      alert("Failed to save rating — check your connection.");
    }
  }

  async function editRating(id, updated) {
    // Optimistic update
    setAllRatings(prev => prev.map(r => r.id===id ? { ...r, ...updated, id } : r));
    try {
      await supa.update("ratings", id, {
        restaurant: updated.restaurant,
        pizza_name: updated.pizzaName,
        style:      updated.style,
        city:       updated.city,
        country:    updated.country,
        score:      updated.score,
        cats:       updated.cats,
        review:     updated.review,
        tags:       updated.tags,
        price:      updated.price,
        currency:   updated.currency,
      });
    } catch(e) {
      alert("Failed to save edit — check your connection.");
    }
  }

  async function deleteRating(id) {
    // Optimistic update
    setAllRatings(prev => prev.filter(r => r.id !== id));
    try {
      await supa.delete("ratings", id);
    } catch(e) {
      alert("Failed to delete — check your connection.");
    }
  }

  // Always clear editingRating when going to Rate fresh
  function goRate() { setEditingRating(null); setPage("rate"); }

  const nav = [
    { id:"home",    label:"Home",    icon:"🏠", onClick:()=>{setPage("home");setSelectedUser(null);} },
    { id:"rate",    label:"Rate",    icon:"🍕", onClick:()=>{goRate();setSelectedUser(null);} },
    { id:"explore", label:"Explore", icon:"🔍", onClick:()=>{setPage("explore");setSelectedUser(null);} },
    { id:"profile", label:"Profile", icon:"👤", onClick:()=>{setPage("profile");setSelectedUser(null);} },
  ];

  const profileUsername = selectedUser || username;
  const profileRatings  = allRatings.filter(r=>(r.user||"").toLowerCase()===(profileUsername||"").toLowerCase());

  return (
    <div style={{ minHeight:"100vh", background:T.bg, fontFamily:"Georgia,serif",
      color:T.textDark }}>

      {/* Header */}
      <header style={{ position:"sticky", top:0, zIndex:50,
        display:"flex", justifyContent:"space-between", alignItems:"center",
        padding:"11px 17px",
        background:T.header,
        borderBottom:`1px solid ${T.border}`,
        backdropFilter:"blur(12px)" }}>
        <button onClick={()=>setPage("home")}
          style={{ display:"flex", alignItems:"center", gap:7,
            background:"none", border:"none", cursor:"pointer" }}>
          <span style={{ fontSize:20 }}>🍕</span>
          <span style={{ fontSize:15, fontWeight:900, color:T.textDark, letterSpacing:"-0.3px" }}>
            In <span style={{ color:T.red }}>Crust</span> We Trust
          </span>
        </button>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <button onClick={()=>{setPage("profile");setSelectedUser(null);}}
            style={{ fontSize:12, fontWeight:800, color:T.amberMid, background:"none",
              border:"none", cursor:"pointer" }}>
            @{username}
          </button>
          <button onClick={()=>{ setCurrentUser(null); setAllRatings([]); setPage("home"); }}
            style={{ fontSize:11, fontWeight:700, color:T.textLight, background:"none",
              border:`1px solid ${T.border}`, borderRadius:7, padding:"4px 8px", cursor:"pointer" }}>
            Sign out
          </button>
        </div>
      </header>

      {/* Pages */}
      <main>
        {page==="home" &&
          <HomePage setPage={setPage} goRate={goRate} setSelectedPizza={setSelectedPizza}
            allPizzas={allPizzas} allRatings={allRatings}/>}
        {page==="rate" &&
          <RatePage setPage={setPage} addRating={addRating} editRating={editRating}
            editingRating={editingRating} setEditingRating={setEditingRating}
            allRatings={allRatings}/>}
        {page==="explore" &&
          <ExplorePage setPage={setPage} goRate={goRate} setSelectedPizza={setSelectedPizza}
            setSelectedRestaurant={setSelectedRestaurant} setSelectedUser={setSelectedUser}
            allPizzas={allPizzas} allUsers={allUsers} allRatings={allRatings}/>}
        {page==="pizza" &&
          <PizzaPage pizza={selectedPizza} setSelectedUser={setSelectedUser} setPage={setPage}/>}
        {page==="restaurant" &&
          <RestaurantPage restaurant={selectedRestaurant} allPizzas={allPizzas}
            allRatings={allRatings} setSelectedPizza={setSelectedPizza} setPage={setPage}/>}
        {page==="profile" &&
          <ProfilePage username={profileUsername} isMe={profileUsername===username}
            myRatings={profileRatings} deleteRating={deleteRating}
            setPage={setPage} goRate={goRate} setSelectedPizza={setSelectedPizza} allPizzaMap={pizzaMap}
            setEditingRating={setEditingRating}/>}
      </main>

      {/* Bottom nav */}
      <nav style={{ position:"fixed", bottom:0, left:0, right:0, display:"flex",
        background:T.header, borderTop:`1px solid ${T.border}`,
        backdropFilter:"blur(12px)" }}>
        {nav.map(n=>(
          <button key={n.id}
            onClick={n.onClick}
            style={{ flex:1, padding:"9px 0 7px",
              display:"flex", flexDirection:"column", alignItems:"center", gap:2,
              background:"none", border:"none", cursor:"pointer",
              color:page===n.id?T.red:T.textLight,
              borderTop:page===n.id?`2px solid ${T.red}`:"2px solid transparent" }}>
            <span style={{ fontSize:18 }}>{n.icon}</span>
            <span style={{ fontSize:9, fontWeight:800, letterSpacing:"0.04em",
              textTransform:"uppercase" }}>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
